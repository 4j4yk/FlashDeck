name: GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode
        run: xcodebuild -version

      - name: Test simulator app
        run: |
          xcodebuild \
            -project FlashCards.xcodeproj \
            -scheme FlashCards \
            -configuration Debug \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 16 Pro' \
            test

      - name: Build release assets
        run: |
          zsh ./scripts/create-release-artifacts.sh
          zsh ./scripts/create-simulator-artifact.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/FlashCards-sideload.ipa
            release/FlashCards-sideload.ipa.sha256
            release/FlashCards-simulator.app.zip
